<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title{font:700 30px DejaVu Sans,sans-serif;fill:#202124}
      .section{font:700 20px DejaVu Sans,sans-serif;fill:#202124}
      .text{font:16px DejaVu Sans,sans-serif;fill:#202124}
      .small{font:14px DejaVu Sans,sans-serif;fill:#202124}
      .box{stroke:#404040;stroke-width:2;rx:12;ry:12}
      .wire{fill:none;stroke:#404040;stroke-width:4;marker-end:url(#arrow)}
      .thin{fill:none;stroke:#606060;stroke-width:2.5;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#606060;stroke-width:2.5;stroke-dasharray:9 7}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#404040"/>
    </marker>
  </defs>

  <rect width="1600" height="1050" fill="#fff"/>
  <text x="800" y="50" text-anchor="middle" class="title">Переделка 12-вольтовой солнечной станции с ИБПС-12-3500</text>

  <rect x="40" y="90" width="1520" height="360" fill="#fafafa" stroke="#777" stroke-width="2" rx="16"/>
  <text x="65" y="125" class="section">Аккумуляторная и силовая часть под шкафом</text>

  <rect class="box" x="80" y="165" width="220" height="95" fill="#d9eaf7"/>
  <text x="190" y="200" text-anchor="middle" class="text">VEKTOR VRC 12-200 №1</text>
  <text x="190" y="230" text-anchor="middle" class="text">12 В, 200 А·ч</text>

  <rect class="box" x="80" y="315" width="220" height="95" fill="#d9eaf7"/>
  <text x="190" y="350" text-anchor="middle" class="text">VEKTOR VRC 12-200 №2</text>
  <text x="190" y="380" text-anchor="middle" class="text">12 В, 200 А·ч</text>

  <rect class="box" x="370" y="165" width="210" height="95" fill="#ffd6d6"/>
  <text x="475" y="195" text-anchor="middle" class="text">F1 — MRBF 200 А</text>
  <text x="475" y="224" text-anchor="middle" class="small">не ниже 58 В DC</text>
  <text x="475" y="246" text-anchor="middle" class="small">штатный держатель у АКБ</text>

  <rect class="box" x="370" y="315" width="210" height="95" fill="#ffd6d6"/>
  <text x="475" y="345" text-anchor="middle" class="text">F2 — MRBF 200 А</text>
  <text x="475" y="374" text-anchor="middle" class="small">не ниже 58 В DC</text>
  <text x="475" y="396" text-anchor="middle" class="small">штатный держатель у АКБ</text>

  <rect class="box" x="675" y="180" width="230" height="90" fill="#ffe7a8"/>
  <text x="790" y="215" text-anchor="middle" class="text">Положительная шина</text>
  <text x="790" y="244" text-anchor="middle" class="small">под защитным кожухом</text>

  <rect class="box" x="675" y="315" width="230" height="80" fill="#d9d9d9"/>
  <text x="790" y="363" text-anchor="middle" class="text">Отрицательная шина</text>

  <rect class="box" x="1060" y="190" width="250" height="130" fill="#cfc7f8"/>
  <text x="1185" y="230" text-anchor="middle" class="section">ИБПС-12-3500</text>
  <text x="1185" y="262" text-anchor="middle" class="text">12 В → 220 В, 3500 Вт</text>
  <text x="1185" y="292" text-anchor="middle" class="small">одна короткая пара 35–50 мм²</text>

  <path class="wire" d="M300 212 H370"/>
  <path class="wire" d="M580 212 H675"/>
  <path class="wire" d="M300 362 H370"/>
  <path class="wire" d="M580 362 H630 V235 H675"/>
  <path class="wire" d="M300 235 V355 H675"/>
  <path class="wire" d="M300 385 H675"/>
  <path class="wire" d="M905 225 H1060"/>
  <path class="wire" d="M905 355 H1010 V290 H1060"/>

  <text x="980" y="205" text-anchor="middle" class="small">≤ 0,5 м</text>
  <text x="980" y="225" text-anchor="middle" class="small">без отдельного выключателя</text>

  <rect x="40" y="480" width="730" height="500" fill="#fafafa" stroke="#777" stroke-width="2" rx="16"/>
  <text x="65" y="518" class="section">Зарядные источники и 12-вольтовые нагрузки</text>

  <rect class="box" x="90" y="565" width="210" height="75" fill="#cdefcb"/>
  <text x="195" y="598" text-anchor="middle" class="text">Солнечные панели</text>
  <text x="195" y="623" text-anchor="middle" class="small">до 1200 Вт</text>

  <rect class="box" x="380" y="540" width="190" height="70" fill="#ffd9a8"/>
  <text x="475" y="582" text-anchor="middle" class="text">MPPT 30 А</text>
  <rect class="box" x="380" y="635" width="190" height="70" fill="#ffd9a8"/>
  <text x="475" y="677" text-anchor="middle" class="text">MPPT 40 А</text>

  <rect class="box" x="90" y="750" width="210" height="70" fill="#d8f3f1"/>
  <text x="195" y="792" text-anchor="middle" class="text">Зарядник №1 — 30 А</text>
  <rect class="box" x="90" y="850" width="210" height="70" fill="#d8f3f1"/>
  <text x="195" y="892" text-anchor="middle" class="text">Зарядник №2 — 30 А</text>

  <rect class="box" x="470" y="785" width="240" height="105" fill="#d9f2d9"/>
  <text x="590" y="820" text-anchor="middle" class="text">Освещение 12 В</text>
  <text x="590" y="850" text-anchor="middle" class="small">предохранитель + защита</text>
  <text x="590" y="872" text-anchor="middle" class="small">от глубокого разряда</text>

  <path class="thin" d="M300 602 H380"/>
  <path class="thin" d="M300 615 H340 V670 H380"/>
  <path class="thin" d="M570 575 H660 V450"/>
  <path class="thin" d="M570 670 H640 V450"/>
  <path class="thin" d="M300 785 H420 V450"/>
  <path class="thin" d="M300 885 H440 V450"/>
  <path class="thin" d="M590 785 V450"/>

  <rect x="810" y="480" width="750" height="500" fill="#fafafa" stroke="#777" stroke-width="2" rx="16"/>
  <text x="835" y="518" class="section">Переменный ток 220 В</text>

  <rect class="box" x="860" y="575" width="150" height="70" fill="#fff2b2"/>
  <text x="935" y="617" text-anchor="middle" class="text">РЭС</text>
  <rect class="box" x="860" y="710" width="150" height="70" fill="#fff2b2"/>
  <text x="935" y="752" text-anchor="middle" class="text">Бензогенератор</text>

  <rect class="box" x="1090" y="635" width="170" height="90" fill="#ffd9a8"/>
  <text x="1175" y="674" text-anchor="middle" class="text">АВР</text>
  <text x="1175" y="700" text-anchor="middle" class="small">РЭС / БГ</text>

  <rect class="box" x="1340" y="565" width="170" height="80" fill="#ffd6d6"/>
  <text x="1425" y="598" text-anchor="middle" class="small">Входной 2P</text>
  <text x="1425" y="622" text-anchor="middle" class="small">автомат ИБП</text>

  <rect class="box" x="1340" y="730" width="170" height="80" fill="#ffd6d6"/>
  <text x="1425" y="763" text-anchor="middle" class="small">Выходной 2P</text>
  <text x="1425" y="787" text-anchor="middle" class="small">автомат ИБП</text>

  <rect class="box" x="1080" y="845" width="220" height="90" fill="#d9f2d9"/>
  <text x="1190" y="884" text-anchor="middle" class="text">Критичные нагрузки</text>
  <text x="1190" y="910" text-anchor="middle" class="small">насосы, холодильник, розетки</text>

  <path class="thin" d="M1010 610 H1090 V665"/>
  <path class="thin" d="M1010 745 H1090 V695"/>
  <path class="thin" d="M1260 665 H1340"/>
  <path class="dash" d="M1425 645 V730"/>
  <path class="thin" d="M1340 770 H1300 V845"/>

  <rect x="845" y="865" width="190" height="75" fill="#fff7d6" stroke="#8a6d1d" stroke-width="2" rx="10"/>
  <text x="940" y="894" text-anchor="middle" class="small">Внешние зарядники</text>
  <text x="940" y="917" text-anchor="middle" class="small">питаются до входа ИБП</text>

  <text x="800" y="1025" text-anchor="middle" class="small">F1/F2 защищают внешние батарейные кабели. Внутренние предохранители ИБП не заменяют эту защиту.</text>
</svg>
