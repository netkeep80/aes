<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="960" viewBox="0 0 1400 960">
  <defs>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#1b1b1b}.head{font:700 18px Arial,sans-serif;fill:#1b1b1b}.txt{font:15px Arial,sans-serif;fill:#1b1b1b}.small{font:13px Arial,sans-serif;fill:#1b1b1b}.box{stroke:#333;stroke-width:2;rx:10;ry:10}.wire{stroke:#333;stroke-width:3;fill:none;marker-end:url(#arrow)}.wire2{stroke:#333;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.note{fill:#fff7d6;stroke:#8a6d1d;stroke-width:2;rx:8;ry:8}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,4 L0,8 z" fill="#333"/></marker>
  </defs>
  <rect width="1400" height="960" fill="#fff"/>
  <text x="700" y="42" text-anchor="middle" class="title">Переделка 12-вольтовой солнечной станции с ИБПС-12-3500</text>
  <rect x="30" y="80" width="720" height="500" fill="#fafafa" stroke="#555" stroke-width="2" rx="14"/>
  <text x="390" y="110" text-anchor="middle" class="head">Под шкафом: аккумуляторы и силовые узлы</text>
  <rect x="65" y="150" width="190" height="80" class="box" fill="#d9eaf7"/><text x="160" y="180" text-anchor="middle" class="head">VRC 12-200 №1</text><text x="160" y="205" text-anchor="middle" class="txt">12 В, 200 А·ч, М8</text>
  <rect x="65" y="360" width="190" height="80" class="box" fill="#d9eaf7"/><text x="160" y="390" text-anchor="middle" class="head">VRC 12-200 №2</text><text x="160" y="415" text-anchor="middle" class="txt">12 В, 200 А·ч, М8</text>
  <rect x="315" y="150" width="150" height="80" class="box" fill="#ffd6d6"/><text x="390" y="180" text-anchor="middle" class="head">F1</text><text x="390" y="205" text-anchor="middle" class="txt">DC-предохранитель</text>
  <rect x="315" y="360" width="150" height="80" class="box" fill="#ffd6d6"/><text x="390" y="390" text-anchor="middle" class="head">F2</text><text x="390" y="415" text-anchor="middle" class="txt">DC-предохранитель</text>
  <rect x="530" y="210" width="180" height="90" class="box" fill="#ffe7a8"/><text x="620" y="240" text-anchor="middle" class="head">Положительная</text><text x="620" y="264" text-anchor="middle" class="head">силовая шина</text><text x="620" y="287" text-anchor="middle" class="small">под защитным кожухом</text>
  <rect x="530" y="390" width="180" height="80" class="box" fill="#d9d9d9"/><text x="620" y="420" text-anchor="middle" class="head">Отрицательная</text><text x="620" y="444" text-anchor="middle" class="head">силовая шина</text>
  <path d="M255 175 H315" class="wire"/><path d="M465 190 H500 V240 H530" class="wire"/><path d="M255 385 H315" class="wire"/><path d="M465 400 H500 V270 H530" class="wire"/>
  <path d="M255 215 H285 V430 H530" class="wire"/><path d="M255 425 H530" class="wire"/>
  <text x="290" y="145" class="small">плюс</text><text x="290" y="350" class="small">плюс</text><text x="285" y="245" class="small">минус</text>
  <rect x="800" y="80" width="560" height="500" fill="#fafafa" stroke="#555" stroke-width="2" rx="14"/>
  <text x="1080" y="110" text-anchor="middle" class="head">Металлический шкаф в подполе</text>
  <rect x="930" y="205" width="300" height="180" class="box" fill="#cfc7f8"/><text x="1080" y="250" text-anchor="middle" class="head">СибКонтакт ИБПС-12-3500</text><text x="1080" y="280" text-anchor="middle" class="txt">12 В → 220 В, 3500 Вт</text><text x="1080" y="310" text-anchor="middle" class="txt">клеммы М6, монтаж клеммами вверх</text><text x="1080" y="340" text-anchor="middle" class="txt">открытое дно, свободная вентиляция</text>
  <path d="M710 245 H820 V255 H930" class="wire"/><path d="M710 430 H850 V335 H930" class="wire"/>
  <text x="810" y="228" text-anchor="middle" class="head">35–50 мм², ≤ 0,5 м</text><text x="810" y="250" text-anchor="middle" class="small">один цельный провод «+»</text><text x="805" y="415" text-anchor="middle" class="small">один цельный провод «−»</text>
  <rect x="825" y="430" width="500" height="105" class="note"/><text x="1075" y="460" text-anchor="middle" class="head">Между шинами и ИБП нет отдельного DC-выключателя</text><text x="1075" y="488" text-anchor="middle" class="txt">Минимум последовательно включённых контактов, падения напряжения и нагрева.</text><text x="1075" y="516" text-anchor="middle" class="txt">F1/F2 снимаются только после полного отключения источников и нагрузок.</text>
  <rect x="30" y="620" width="1330" height="290" fill="#fafafa" stroke="#555" stroke-width="2" rx="14"/>
  <text x="695" y="652" text-anchor="middle" class="head">Зарядные источники, 12-вольтовые и 220-вольтовые нагрузки</text>
  <rect x="65" y="700" width="180" height="70" class="box" fill="#cdefcb"/><text x="155" y="728" text-anchor="middle" class="head">Солнечные панели</text><text x="155" y="752" text-anchor="middle" class="txt">до 1200 Вт</text>
  <rect x="300" y="680" width="160" height="70" class="box" fill="#ffd9a8"/><text x="380" y="710" text-anchor="middle" class="head">MPPT 30 А</text><text x="380" y="735" text-anchor="middle" class="small">с DC-защитой</text>
  <rect x="300" y="785" width="160" height="70" class="box" fill="#ffd9a8"/><text x="380" y="815" text-anchor="middle" class="head">MPPT 40 А</text><text x="380" y="840" text-anchor="middle" class="small">с DC-защитой</text>
  <rect x="525" y="680" width="170" height="70" class="box" fill="#d8f3f1"/><text x="610" y="710" text-anchor="middle" class="head">Зарядник №1</text><text x="610" y="735" text-anchor="middle" class="txt">ограничен до 30 А</text>
  <rect x="525" y="785" width="170" height="70" class="box" fill="#d8f3f1"/><text x="610" y="815" text-anchor="middle" class="head">Зарядник №2</text><text x="610" y="840" text-anchor="middle" class="txt">ограничен до 30 А</text>
  <rect x="760" y="680" width="190" height="70" class="box" fill="#e8d9f7"/><text x="855" y="710" text-anchor="middle" class="head">Освещение 12 В</text><text x="855" y="735" text-anchor="middle" class="small">предохранитель + LVD</text>
  <rect x="760" y="785" width="190" height="70" class="box" fill="#fff2b2"/><text x="855" y="815" text-anchor="middle" class="head">РЭС / генератор</text><text x="855" y="840" text-anchor="middle" class="small">через АВР</text>
  <rect x="1015" y="680" width="290" height="70" class="box" fill="#d9f2d9"/><text x="1160" y="710" text-anchor="middle" class="head">Критичные нагрузки 220 В</text><text x="1160" y="735" text-anchor="middle" class="small">насосы, холодильник, компрессор, розетки</text>
  <rect x="1015" y="785" width="290" height="70" class="box" fill="#fff7d6"/><text x="1160" y="813" text-anchor="middle" class="head">ВЧ-конденсаторы</text><text x="1160" y="838" text-anchor="middle" class="small">только после измерений, рядом с ИБП</text>
  <path d="M245 735 H300" class="wire2"/><path d="M245 735 H270 V820 H300" class="wire2"/><path d="M460 715 H485 V610 H620 V470" class="wire2"/><path d="M460 820 H495 V600 H620 V470" class="wire2"/><path d="M695 715 H720 V590 H620 V470" class="wire2"/><path d="M695 820 H730 V580 H620 V470" class="wire2"/><path d="M710 275 H745 V715 H760" class="wire2"/><path d="M950 820 H980 V295 H930" class="wire2"/><path d="M1230 295 H1270 V680" class="wire2"/><path d="M1015 820 H990 V350 H930" class="wire2"/>
  <text x="700" y="935" text-anchor="middle" class="small">F1/F2 — обязательная защита внешних аккумуляторных кабелей; точный номинал определяется после выбора кабелей и времятоковой характеристики.</text>
</svg>